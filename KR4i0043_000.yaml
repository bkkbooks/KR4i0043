body:
  text: 浩然齋雅談目録詩文評類卷上六十七條卷中一百四條卷下二十六條臣等謹案浩然齋雅談宋周密撰密所著書凡數種其癸辛雜識新識後識續識齊東野語皆記宋末之事雲煙過眼録皆記書畫古器今並有刋版其澄懷録續録則採輯清談志雅堂雜鈔則博徴瑣事今惟鈔本僅存千頃堂書目載密所著尚有浩然齋視聽鈔浩然齋意鈔及此書而皆無卷數藏弆之家亦並無傳本惟此書散見永樂大典中其書體類説部而所載實皆詩文評今搜輯排纂以考證經史評論文章者為上卷以詩話為中卷以詞話為下卷各以類從尚裒然成帙密本南宋遺老多識舊人舊事故其所記佚篇賸闋什九為他書所不載朱彛尊編詞綜厲鶚編宋詩紀事又與符曾等七人編南宋雜事詩皆博採羣書號為繁富而是書所載故實亦皆未嘗引據則希覯可知矣其中考證經義如解詩巧笑倩兮疑口輔當為笑靨而不知類篇面部已有此文解易井谷射鮒以鮒為鯽不知説文鯽字本訓烏鰂後世乃借以名鮒羅願爾雅翼辨之巳明如斯之類於訓詁皆未免稍疏然密本詞人考證乃其旁涉不足為譏若其品騭詩詞則固具有深識非如阮閲諸人漫然搜輯不擇精粗者也宋人詩話傳者如林大抵陳陳相因輾轉援引是書頗具鑒裁而沈晦有年佚而復出足以新藝苑之耳目是固宜亟廣其傳者矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀浩然齋雅談目録
  hash: sha256:687b6a9057544eca954f9717dbe725190192b5ab464b75dc9f39456f21037fdf
