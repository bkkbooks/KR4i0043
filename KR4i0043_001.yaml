body:
  text: 浩然齊雅談卷上宋周密撰井九二谷射鮒或以為蝦或以為蟇或以為蛙或以為蝸考之韻書鮒扶句切鰿魚也然鰿鯽􅠧三字並同子亦切注云鮒也蓋今鯽魚耳莊子涸鮒注亦以為鯽魚然今世有魚如鱨四鬛巨口善食水蟲故人家井內多畜之俗呼為鱏得非井卦所指者乎詩先集維霰補注云霰稷雪也或謂之米雪謂其粒若米然稷雪米雪字甚奇碩人之詩曰巧笑倩兮注曰好口輔也大招述婦人之美亦有靨輔奇牙之語可謂善於形容後人雖極言女色之美無所不至乃獨不及於口輔何耶輔豈俗所謂笑靨者乎蹇修以為理朱元晦云謂為媒者以通詞理也下文理弱而媒拙則云恐道理弱似與前說異按九章令薜荔以為理兮憚舉趾而緣朩因芙蓉以為媒兮憚褰裳而濡足亦以媒理對言左傳行理之命無月不至注行理行使也復奚疑真文忠初字景元樓攻愧語以明元無義遂易為希元然俞清老嘗名軒曰景陶山谷曰景陶名未佳詩云景行景明也魏晉間人所謂景莊景儉等自有一人誤用遂以相承謬耳按詩景行注云景明也其義以明行行止謂有明行則行之初無企慕之義然孝經序亦用景行先哲而近世洪文敏兄弟皆以景為字何耶顧第弗深考耳前輩闢浮圖修崇之說甚衆獨南豐之說最為簡明彌陀閣記有云無為之義晦而心法勝積善積惡之誡泯而因緣作至於虞祔練祥春秋祭祀之儀不競則七日三年地獄劫化之辨亦隨而進又答黃漢傑書云民之耳目鼻口心知百體皆有所主其於異端何暇及哉後之儒者無以導民之耳目鼻口心知百體皆無所主將舍浮圖何適哉又云如使周禮尚行朝夕朔月半薦新啓柩祖遣有奠虞卒哭祔小祥大祥禫有祭日月時歲皆有禮以行之哀情有所泄則必不暇曰七日曰百日曰周年曰三年齊也然歐公本論亦有此意云佛所以為吾患者乘其廢闕之時而來此其受患之本也補其闕修其廢使王政明而禮義充則雖有佛無所施於民矣昔人有言韓退之送李願歸盤谷序所述官爵侍御賔客之盛皆不過數語至於說聲色之奉則纍數十言或以譏之余謂豈特退之為然如宋玉招魂其言髙堂邃宇翠翹珠被畋獵飲食之類亦不過數語至於蘭膏明燭華容備二八侍宿射遞代九侯淑女多迅衆盛鬋不同制實滿宫容態好比順彌代弱顔固植謇其有意姱容修態絙洞房蛾眉曼睩目騰光靡顔膩理遺視矊又曰美人既醉朱顔酡娭光眇視目曾波被文服纖麗而不奇長髮曼鬋豔陸離二八齊容起鄭舞以至吳歈蔡謳士女雜坐亂而不分又大招亦云朱脣皓齒嫭以姱比德好閒習以都豐肉微骨調以娛嫮目宜笑蛾眉曼容則秀雅稚朱顔姱修滂浩麗以佳會頰倚耳曲眉規滂心綽態姣麗施小腰秀頸若鮮卑昜中和心以動作粉白黛黑施芳澤青色直眉美目媔靨輔奇牙宜笑嘕豐肉微骨體便娟皆長言摹寫極女色燕昵之盛是知聲色之移人古今皆然戲書為退之解嘲案此條永樂大典原本曼睩之睩誤作録豔陸下衍麗字今據楚辭校正其引招魂節去些字引大招節去只字悉仍之涪翁云章子厚嘗言楚辭蓋有所祖述初不謂然子厚曰九歌蓋取諸國風九章蓋取諸二雅離騷蓋取諸頌考之信然日與月合則長明性與命合則長生又日在天曰明明者日月之橫合在世為易易者日月之從合在人為丹丹者日月之中合此海瓊語也孫景茂云太公八十遇文王今世皆以此藉口九辨乃云太公九十乃顯榮兮而東方曼倩則云太公體行仁義七十有二乃用於文武馬永卿嘗疑焉然香山詩乃云釣人不釣魚七十得文王不知又出何書也蘇仲虎侍郎藏東坡所書富文忠神道碑真跡前後諸名人題跋極多獨周文忠為之壓卷云富文忠之使遼所謂肅肅王命仲山甫將之蘇文忠之翰墨所謂吉甫作誦穆如清風也大雅蒸民茲可無愧富公孫樞密蘇公猶子侍郎皆題名卷末抑所謂臧孫有後於魯者戴岷隱論蕭望之曰夫小人之害君子也必深明其情而後用其術故攻其所惡犯其所忌中其所不欲而致其所不樂其柔仁朴厚也或怵之其廉潔自喜也或汙之其剛果卞急也或激之多方以誤之百計以困之逼之辱之以致其必死之術有如君子一不能忍而決於速死則小人之計中矣吕伯恭亦云君子必有堅忍不拔之操然後小人不能犯吾之所忌嗚呼小人之害君子何其多端也遇人之介者則必辱之遇人之亷者則必汙之遇人之剛者則必折之遇人之直者則必誣之蓋介者不受辱亷者不受汙剛者不受折直者不受誣凡此皆君子之所忌也小人知君子之所忌而直犯之君子不知而墮其計大則死小則亡前後相望可不為大哀乎二說真能盡小人之情狀有不期同而同者焉孝宣於儒生無所用獨用蕭望之觀其始終方拙非能自撓以求合者特以其于霍氏立同異故耳士君子之經世非曰委蛇曲從為終始牢固之術然而變化詘伸自當兼通義命望之當孝元初天下事在掌握既不能輔贊裁成同歸于道及其潰敗又不知推委興廢以禮而止隄壞防決無所措躬卒就死地而陷孝元為不辨菽麥之主班固乃哀其為便嬖宧豎所圖不知自古小人何嘗一日不欲勝君子豳詩歌周公固殆未之學也王宣子在上庠日與程泰之善暇日因及代言之體要當溫純深厚如訓誥中語始為王言吾儕異時秉筆當革近世磔裂之弊二十年後宣子帥潭泰之以少蓬攝外制為詞云荆及衡陽自北而南十國為連連有帥地大民衆疇咨俾乂厥惟艱哉以爾有猷有為有守率自中寬而有制剛而無虐庸建爾於上游藩輔往哉惟欽惠困窮若保赤子明乃服命若網在綱有弗若於汝政弗化於汝訓辟以止辟乃辟則豫一人汝嘉且寓書於宣子曰疇昔之約今其踐矣陳氏耳擇集所載以為芮國器非也韓平原南園既成遂以記屬之陸務觀務觀辭不獲遂以其歸耕退休二亭名以警其滿溢勇退之意甚婉韓不能用其語遂致於敗務觀亦以此得罪遂落次對太中大夫致仕外祖章文莊兼外制行詞云山林之興方適已遂掛冠子孫之纍未忘胡為改節雖文人不顧於細行而賢者責備於春秋某官早著英猷寖躋膴仕功名已老瀟然鑑曲之酒船文采不衰貴甚長安之紙價豈謂宜休之晚節蔽於不義之浮雲深刻大書固可追於前輩髙風徑節得無愧於古人時以是而深譏朕亦為之慨歎二疏既逺汝其深知足之思大老來歸朕豈忘善養之道勉圖終去服我寬恩此文已載於嘉林外制集或以為蔡幼學或謂出於馮端方皆非也劉原父云聖人之治天下能使百官萬物如耳目心口手足之不可易亦不相德濟之如一身而天下安有不治哉東坡亦曰今夫人之一身有一心兩手而已疾痛疴癢動於百體之中雖其甚微不足以為患兩手隨至夫手之至豈其一一而聽之心哉心之所以素愛其身者深而手之所以素聽於心者熟是故不待使令而卒然以自至聖人之治天下亦如此而巳二說如出一轍蘇明允辨姦嘗見直齊陳先生言此雖為介甫發然間亦似及二程所以後來朱晦菴極力回護云老蘇辨姦初間只是私意後來荆公做不著遂中他說然荆公氣習自是要遺形骸離世俗的規模要知此便是放心辨姦以此為姦恐不然也又云每嘗嫌事之不近人情者鮮不為大姦慝之語過當而今見得亦有此等人其辭甚費也子厚有答人書云人生少得六七十者今巳三十七矣長來覺日月益促歲歲更甚大都不過數十寒暑則無此身矣是非榮辱又何足道又書云假令病盡已身復壯悠悠人世亦不過為三十年客耳前過三十七年與瞬息無異後所得者其不足把玩亦巳審矣此二書皆在元和四年時子厚年三十七後十年當元和十四年子厚卒年止四十有七耳所謂數十寒暑三十年客竟不酬初志悲夫昔有問王介甫佛家有日月燈光佛燈何以能並日月介甫曰日煜乎晝月煜乎夜燈煜乎日月之所不及東萊博議論史官亦云昧谷餞日之後晹谷賔日之前暮夜晦冥羣慝並作茍無燭以代明則天之目瞽矣亦用介甫意然皆本之莊子月固不勝火郭象注曰大而暗不若小而明東坡曰陋哉斯言為更之曰明於大者必晦於小月能燭天地而不能燭毫釐此其所以不勝於火也然卒之火勝月月勝火耶坡翁九成臺銘云使耳聞天籟則凡有聲有形者皆吾羽旄干戚管磬匏弦又云望蒼梧之渺莽九疑之聨綿覽觀江山之吐吞草朩之俯仰鳥獸之鳴號衆竅之呼吸往來唱和非有度數而均節自成者非韶之大全乎楊龜山乃謂子瞻此說以江山吐吞草朩俯仰衆竅呼吸鳥獸鳴號為天籟此乃莊子所謂地籟也但其文精妙故讀之者或未察耳豫嘗因其語以考莊周之說云南郭子綦曰汝聞人籟而未聞地籟汝聞地籟而未聞天籟子游曰敢問其方子綦曰地籟則衆竅是已人籟則比竹是巳敢問天籟子綦曰夫吹萬不同而使其自已者咸其自取怒者其誰耶郭象注云夫天籟者豈復别有一物哉即衆竅比竹之屬若如所注則所謂鳥獸之鳴號衆竅之呼吸非天籟而何不知龜山又以何物為天籟乎漫書以俟識者然東萊云東坡九成臺銘實文耳而謂之銘以其中皆用韻而讀之久乃覺是其妙也坡翁䇿斷謂語有曰鼠不容穴銜窶藪也窶藪二字出漢書楊惲傳云我不能自保真人所謂鼠不容穴銜窶藪也注云窶藪戴器也以盆盛物戴於頭者則以窶藪薦之盆下之物有飲食氣故鼠銜之所以不容穴坐銜窶藪自妨故不得入穴窶音貧窶之窶藪音數物之數上其羽切下山羽切案此條多脫誤字今據漢書傳注校正龍眠畫五馬圖空青老人會紆公卷跋之曰元祐庚午歲以方開科應詔來京師見魯直九丈於酺池寺魯直時為張仲達箋題李伯時畫天馬圖魯直謂余曰異哉伯時貌天廄滿川花放筆而馬殂矣蓋神駿精魄皆為伯時筆端取之而去實古今異事當作數語記之後十四年當崇寧癸未余以黨人貶零陵魯直除籍徙宜州過余瀟湘江上因與徐端國朱彥明道伯時畫殺滿川花事云此公卷之所親見余曰九丈當踐前言記之魯直笑曰只少此一件罪過後二年魯直死貶所又二十七年余將漕兩浙當紹興辛亥至嘉禾與梁仲謨吳德素張元覽泛舟訪劉延仲于真如寺延仲遽出是圖開卷錯愕宛然疇昔撫掌念往逾四十年憂患餘生巋然獨存倣徨弔影殆若異身也因詳叙本末不特使來者知伯時一段異事亦魯直遺意云云按畫殺滿川花亦當時一段異事而傳記所不載紀詠所不及何耶豈是時方以獲罪為懼諱不敢言耶王逢原嘗賦韓幹畫馬云傳聞三馬同日死死魄到紙氣方就豈前世亦有此事乎李易安紹興癸亥在行都有親聨為內命婦者因端午進帖子皇帝閣曰日月堯天大璿璣舜厯長側聞行殿帳多集上書囊皇后閣云意帖初宜夏金駒已過蠶至尊千萬夀行見百斯男夫人閣云三宫催解粽妝罷未天明便面天題字歌頭御賜名時秦楚材在翰苑惡之止賜金帛而罷意帖用上官昭容事前輩公主制云瓊華在著已戒齊風之驕粉水疏園莫如徐國之樂晏公類要亦用粉田事蓋亦脂澤湯沐之意也若駙馬則以何晏事稱粉郎粉侯文及甫稱韓忠彥為粉昆以其為嘉彥之兄又指王師約之父克臣為粉爹益可怪劉潜夫王實之平昔論交最深且意氣不相下實之蹭蹬凡六為别駕其為吉倅適潜夫宜春之麾與之相先後潜夫開宴為餞且侑之樂語有云有謫仙人駿馬名姬豪放之風無杜陵老殘杯冷炙悲辛之態又云擁通德而著書命便了而酤酒麗人歌陶秀實郵亭之典好事繪韓熙載夜宴之圖賀客盈門勸展驥而為别駕長官分席歎無蟹而有監州極摹寫之妙焉既而實之報席亦有侑語云七年三出使山嶽漸見動搖十載六監州風月不禁分破陌上歌採桑曲惱殺羅敷觀中賦種桃詩壓倒夢得梅花入句如何遜之在揚州薏苡滿船如伏波之歸交趾忌名下人棄沅芷湘蘭而不佩滿禁中語覺階薇砌藥之無情皆能抓著癢處也葉隆禮士則謫居袁州袁之士友醵酒以招之蜀士張汴朝宗作樂語一聨云掃地焚香有蘇州之雅淡仰天拊缶無楊氏之怨傷士則大稱之水心翁以抉雲漢分天章之才未嘗輕可一世乃於四靈若自以為不及者何耶此即昌黎之於東野六一之於宛陵也惟其富贍雄偉欲為清空而不可得一旦見之若厭膏梁而甘藜藿故不覺有契於心耳昔吳中有老糜丈多學博記每見吳仲孚小詩輒驚羡云老夫才落筆即為堯舜周孔漢髙祖唐太宗追逐不置君何為能脫灑如此哉即水心取四靈之意也臨江丁熺乙丑諒暗榜第四人為他恩例所壓抑居第八授永州教章采代為作啓謝辨章云諸公衮衮皆自下以升髙一介休休獨瞻前而忽後廖羣玉亟稱於賈改隆興節推晏殊嘗進牡丹詩表云布在密清之囿密清二字人多不曉蓋用東京賦中語京室密清罔有不韙王宣子守吳幕僚投啓有云仲舒裒然舉首豈久相於江都望之雅意本朝姑暫居於馮翊宣子喜之舉以京剡楊廷秀以大蓬漕江東其屬亦有啓云斯文之得喪在天領袖素尊於海內賢者之出處以道旌旗已至於江東公亦欣然剡上史直翁丞相表語云侵尋歲月六十有三補報朝廷萬分無一又李淇水謝户書云補報朝廷本末無萬分之一因循歲月甲子已六十有奇霅中有游士春時誤入趙孟􅔲之園者案趙孟􅔲之􅔲原本誤作蟻今據宋史宗室表改正為其家幹僕所辱訟之於官郡守趙必槐德符治之士子以啓為謝云杜陵之厦千萬間意謂大庇寒於天下齊王之囿四十里不知乃為穽於國中劉自之被召試用虛齊趙以夫之薦也既而為庸齊趙汝騰所激於是以盧鉞威伸補其選盧以同里之嫌辭之云楚亡弓楚得弓難泯同鄉之迹漢刻印漢銷印初何反汗之嫌卒辭之又蕭振再知四川趙莊叔行詞云刻印銷印如轉圜朕嘗虛巳失馬得馬如反掌卿勿容心宣和間尚書新省成車駕臨幸時宰命一時朝士能文者各擬謝表獨林子中者擅場其一聨云北辰居極外環象斗之宫黃道初經旁及積星之位嘉定間寶謨閣學士許奕病篤口占遺表云臣非衰病偶染微疴當湯尉可去之時臣則以疾而為諱及針砭已窮之後醫遂束手而莫圖靜思膏肓所致之由大抵脈絡不通之故固知養患成禍豈惟理身則然茍能疏壅預防以之醫國亦可蓋指近事以為身喻也乾道間胡周伯尚書亦云賈誼號通達國體大瘇􅏓盩類辟病痱皆借一身喻之今日國體何病也能言病未必能處方不能言病而輒處方誤人死矣今日之病名風虛虛內也風外也外風忽中半身不遂靖康也幸其半存建炎也咎已往半存之身常凜凛不自保也今欲併治不遂者怵市道之說售嘗試之方湯慰砭石雜然而進使誼復生必慮中風至再至半存之身亦不能救矣所謂可痛哭流涕者也蓋本吕獻可乞致仕表云臣本無宿疾偶值醫者用術乖方不知脈候有虛實隂陽有順逆診察有標本治療有後先妄投湯劑率任情意差之指下禍延四肢寖成風痺遂難行步非徒憚􅏓盩之苦又將虞心腹之變勢已及此為之奈何雖然一身之微固所未恤其如九族之託良以為憂是思逃祿以偷生不俟引年而退政三公之論實祖誼云開慶間馬華父制置江閫日嘗於青溪建祠以祀先賢斷自吳泰伯以下凡四十一人皆嘗仕若居若遊於此者獲與焉蓋華父之祖亦嘗仕於升故也祠成命馮可遷贊之其贊馬公末語有爾祖其從與享之句或摘以為譏華父遂去乃祖之祀焉或謂劉子澄清叔與華父有宿憾授意於馮云王似賀太常丞兼翰林權直一聨云白也無敵雅宜翰林供奉之才赤爾何如暫習宗廟會同之事又賀司業除翰苑云國子先生晨入太學翰林學士夜讀禁中王圭行郝質殿巖制云曽無夜鼜之譁自得剛牙之重周禮地官凡軍旅夜鼓鼜千歷切注云戒守鼓也張孝曽之父少師與洪忠宣久陷金國其後獲歸而終身為秦檜之所抑近世陳容公儲跋其墓碑云流離區脫視死如飴君子有性焉不謂命也絶漠來歸忠不見録君子有命焉不謂性也暨檜殞金亡忠宣少師二公如生故曰知性與命則知天矣建炎末柔福帝姬自北歸朝廷封為福國長公主下降駙馬都尉髙世榮汪浮溪當制云趙城方急魯元嘗用於車馳江左復興益夀宜充於禁臠可謂善用事楊大年云觀書百行須中程漢刑法志夜理文書自程決事日懸石之一注云懸稱也省讀文書日以百二十斤為程唐僧齊已有白蓮集為風騷㫖格所與遊者吳融鄭谷皆晚唐人也杜詩所稱已公茅屋下可以賦新詩決非此已公明矣劉平國戲題云選詩非選官論詩非論人故若耶女子天竺牧童皆得預唐名公之列詩文中有摘人姓名一字而言者如班固幽通賦巨滔天而泯夏兮以王莽字巨君重醉行而自耦重乃重耳李白扶風豪士歌云原嘗春陵六國時蓋四公子也杜詩用揚馬則雄相如也卿雲淵雲則長卿子雲王褒也東馬則方朔相如也如葛亮馬相如等甚多亦有礙理者然論語吾友張也舜典伯汝作秩宗蓋亦有所本也赤壁賦謂自其變者而觀之則天地曾不能以一瞬自其不變者而觀之則物與我皆無盡也此蓋用莊子句法自其異者而眂之肝膽楚越也自其同者而眂之萬物皆一也又用楞嚴經意佛告波斯匿王言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆河與昔童時觀河之見有童耄不王言不也世尊佛言汝面雖皺而此見精性未嘗皺皺者為變不皺非變變者受生滅不變者元無生滅周子充作定光菴記佛以慧日照三千大千世界顧豈滯於方然日出暘谷浴於咸池拂於扶桑躔度必有所舍其明難與佛等乃全用東坡奉安神宗書閣祝文語也東坡赤壁賦多用史記語如杯盤狼藉歸而謀諸婦皆滑稽傳正襟危坐日者傳舉網得魚龜策傳開户視之不見其處則如神女賦所謂以文為戲者東坡云往時陳述古好論禪自以為至矣而鄙僕所言為淺陋僕語述古公之所談譬之於食龍肉也而僕所學豬肉也豬之與龍則有間矣然公終日說龍肉不知僕之食豬肉實美而真飽也不知君所得者果何也甫里有杞菊賦東坡有後杞菊賦張南軒有續賦夏樞密亦有續賦亦各有意薛夢桂字叔載號梯飆永嘉人父大圭紹熙間上書乞立儲在趙忠定諸人先叔載擢髙科通京籍風度清逺所居西湖五雲山曰隔凡關曰林壑甕通命之曰方崖小隱諸名士莫不納交焉儷語古文詞筆皆灑落不特詩也張建自號蘭泉其論詩云作詩不論長篇短韻須要詞理具足不缺不餘如荷上灑水散為露珠大者如豆小者如粟細者如塵一一看之無不圓成始為盡善髙復古嘗謂學者云胸中無千百家書乃欲為詩如賈人無資終不能致奇貨也宋之文治雖盛然諸老率崇性理卑藝文朱氏主程而抑蘇吕氏文鑑去取多朱意故文字多遺落者極可惜水心葉氏云洛學興而文字壞至哉言乎石林詞誰採蘋花寄與又悵望蘭舟容與或以為重押韻遂改為寄取殊無義理蓋容與之與自音豫乃去聲也揚子雲河東賦云靈輿安步風流容與注天子之容服而安豫與讀為豫漢禮樂志練時日淡容與注間舒皆去聲姜堯章鐃歌鼓吹曲乃步驟尹師魯皇雅越九歌乃規模鮮于子駿九誦然言辭峻潔意度蕭逺似或過之士大夫辭榮固是美事然有不當辭而辭者至於不肯磨勘甚而批毁印厯而世以為髙而效之者皆非中道也司馬公辭樞密副使章有云臣自幼時習賦論䇿就試每三年一次乞磨勘豈不慕榮貴者乎蓋天下自有中道過猶不及也此為古今至論今所謂喋喋辭免者安知非飾詐邀名哉德祐末大臣則又有以辭榮而避難者此尤不足道也坡翁謂陳師仲曰足下所至詩但不擇古律以日月次之異日觀之便是行記此說極佳故王筠以一官為一集楊大年亦然所著有括蒼武夷潁隂韓城退居海陽蓬山冠鼇辭之類簡齊所謂一官成一集盡付古沙頭是也史達祖邦卿開禧堂吏也當平原用事時盡握三省權一時士大夫無亷恥者皆趨其門呼為梅溪先生韓敗達祖亦貶死善詞章多有膾炙人口者李和父云其詩亦間有佳者李文饒退身論云天下善人少惡人多一旦去權禍機不測操政柄以禦怨誹者如荷㦸以當猛獸閉關以待暴客若舍㦸開關則寇難立至遲遲不去以延一日之命庶免終身之禍是以懼禍而不斷未必皆耽祿而已嗚呼其言亦哀矣宣律師嘗夜夢神人燒香供養香氣與世間不同因問曰此何香答云西天棘林中香案夢天棘事蔡夢弼注杜甫詩嘗引之此條必考證甫詩而傳寫佚其後半周益公嘗戲作賀冬啓云數九九而哦詩自憐午瘦辦多多而有酒驟覺冬肥林子善家藏崔慤畫龜甚佳朱希真作贊曰骨為裘褐氣為餼饘孰令汝夀惟蟲知天他日碧波蓮葉上不知誰見小如錢蔣重珍伯父能禪其亡也重珍祭之以文云不必輕生前以為空不必重死後以為實此語極有味周子充云文章有天分有人力而詩為甚才髙者語新氣和者韻勝此天分也世言李泰伯不喜孟子而所賦哀老婦詩云仁政先四者著在孟軻書何耶正則作吕君用志形容其儉以起家之意云一扇十年尚補緝之道遇墜炭數寸亦袖攜以歸亦近乎薄矣天聖中吳咸為殿中丞吳中所居有紅梅閣蓋吳有愛姬者紅梅因以名閣又作折紅梅詞菖蒲花難見面古語也案玉臺新詠載西曲歌烏夜啼曰菖蒲花可憐聞名不曾識南史亦載張皇后見菖蒲事必宋人詩詞有用此典者故密引古語證明出處而傳寫佚其後半浩然齊雅談卷上
