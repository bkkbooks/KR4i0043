body:
  text: 浩然齋雅談巻中宋周密撰白傅詩天黄生颶母雨黒長楓人案此白居易送客遊嶺南詩原本誤作太白詩雨字誤作雷今校正注云颶母如㫁虹有大風即見楓人因夜黒雲雨暗長數丈比見李仲賔云往年在東平舟夜行殘夜微月擁篷眺望忽有黒雲起天角漸成巨人其長數十丈掉臂闊步行水上掠舟而西一舟皆驚魘羣起視之其去如飛得非所謂楓人耶對偶之佳者曰數㸃雨聲風約住一枝花影月移来栁搖臺榭東風軟花壓欄杆春晝長天下三分明月夜揚州十里小紅樓梨園子弟白髪新江州司馬青衫濕數聨皆天衣無縫妙合自然昌黎之貶山陽遇順宗即位赦以伾文之黨尚熾不得放還其寄三學士詩云前日遇恩赦私心喜還憂果然又羈縻不得供鉏耰又憶昨行云伾文未揃厓州熾雖得赦宥常愁猜近者三姦悉破碎羽窟無底幽黄能眼中了了見鄉國知歸有日眉方開其情亦可憐矣大抵小人專政安肯以恩赦放逐客懼恩不及已故也岑嘉州赤驃馬歌云半明翦出三鬉髙樂天亦云馬鬛翦三花所謂三花者葢唐御馬多翦鬉為三瓣李伯時常畫三鬉馬圖余少日觀御馬有翦作山水人物花鳥之像甚精一時所尚如此葢不止翦三鬉也孟郊云難將寸草心報答三春暉案孟郊遊子吟誰言寸草心報得三春暉葢傳本有異此語闗綱常非唐詩人語也至東坡詩云微生真草朩無處謝天力慈顔如春風不見桃李實古今抱此恨有志俯仰失其言尤悲東萊於蓼莪章云莪蒿不能報天地之生育猶人子不能報父母之劬勞皆祖郊之意也少陵甞果栗㱀開㱀或作雛周繇賦云開栗弋之紫㱀貫休詩云新蟬避栗㱀又云栗不知㱀落按集韻㱀側尤切草紋蹙也即栗篷耳案廣韻㱀初紀切音㓼齧也無側尤切平聲攷貫休集作栗皺注栗篷也集韻菑尤切縐平聲革紋蹙也字从皮不从欠據此則㱀當作皺草紋亦當是革紋之誤又案貫休詩以栗皺菱殻固當作皺杜詩本作栗園以對樵徑則又不必改作栗皺矣今就原文訂證之杜詩喜用懸字然皆絶奇如江鳴夜雨懸侵籬澗水懸山猨樹樹懸空林暮景懸當空淚臉懸獼猴疊疊懸疎籬野蔓懸複道重樓錦繡懸白傅詩云曽家機上聞投杼尹氏園中見掇蜂但以恩情生罅隙何人不解作江充小坡思子臺賦云彼楊公之愛修兮豈減吾之蒼舒皆深中人情李商隠詩云咸陽宫殿鬱嵯峨六國樓臺艷綺羅自是當年秦帝醉不闗天地有山河末句殊不可曉南昌裘聞詩以為秦帝合作天帝天地合作秦地事在張平子西京賦曰昔者大帝悅穆公而覲之饗以鈞天廣樂帝有醉焉乃為金䇿錫用此土而翦諸鶉首是時也並為强國者有六然而四海同宅西秦豈不詭哉李善注昔穆公甞如此七日而寤志林曰天帝醉秦暴金誤隕石墜列仙贊云秦穆受金䇿祚世之業史載秦地雨金三日誤隕其是耶嗚呼天帝果有時而醉乎李商隠晉元帝廟云青山遺廟與僧鄰斷鏃殘碑鎖暗塵紫葢適符江左運翠華空憶洛中春夜臺無月照珠户秋殿有風開玉宸弓劍神靈是何處年年春緑上麒麟案此詩李商隠集不載未詳所據何本疑姓名有誤東坡詩喜用朅来字朅来東觀棄丹墨長陵朅来見大姊朅来城下作飛石朅来畦東走畦西朅来從我遊朅来齊安野朅来清潁上朅来亷泉上其用字葢出於顔延年秋胡詩朅来空復辭所用之意同耳坡翁甞作女髑髏賛云黄沙枯髑髏本是桃李面而今不忍看當時恨不見業風相鼓轉巧色美倩盼無師無眼禪著便成一片其後徑山大慧師宗杲亦作半面女髑髏賛云十分春色誰人不愛視此三分可以為戒甫成四句忽若有續之者云玉樓清夜未眠時留得香雲半邊在呉君特甞戲賦思佳客詞云釵燕攏雲睡起時隔牆折得杏花枝青春半面妝如畫細雨三更花欲飛情輕愛别舊相知㫁腸青冢幾斜暉亂紅一任風吹起結習空時不㸃衣案此詞未載詞譜後半闋當以三字二句換頭乃作七字一句或宋人有此别體東坡謂晨飲為澆書李黄門謂午睡為攤飯放翁拾以為句云澆書滿挹浮蛆甕攤飯横眠夢蝶牀陸放翁有心太平菴詩云天下本無事庸人擾之耳胸中故湛然忿欲定誰使又云少年妄起功名念豈信身閒心太平樂天有云閒傾三數酌醉吟十餘聲便是羲皇代先從心太平葢出黄庭經云觀志流神寄奇靈閒暇無事修太平又外景經云觀志遊神三奇靈行閒無事心太平又樂天云此身不欲全强健强健多生人我心又云自學坐禪休服藥從他日復病沈沈于良史云僻居人事少多病道心生此存楚以為外懼之意放翁在朝日甞與館閣諸人會飲於張功父南湖園酒酣主人出小姬新桃者歌自製曲以侑尊以手中團扇求詩於翁翁書一絶云寒食清明數日中西園春事又怱怱梅花自避新桃李不為髙樓一笛風葢戲寓小姬名於句中以為一笑當路有恚之者遽指以為所譏竟以此去放翁有南酒應憐未歸客及更就髙僧學白羮葢嘉州用南中法釀酒及僧用糝加菜不施鹽酪故名白羮放翁詩云故人自作宣明面老子曾聞正始音宋劉瑀與顔竣書云朱修之五代叛者一朝居青油幕下作謝宣明面向人謝鯤重衛玠言論彌日王敦謂鯤曰微言之緒絶而復續不意永嘉之末復聞正始之音正始乃魏齊王芳年號宣明謝晦字也俗以油餳綴糝作餌名之曰蓼花取其形似也放翁詩云新蝶餳枝綴紅糝餳枝二字甚新放翁詩多用新語如厚味無人設佞湯微芬時自炷亷香自注以松子胡桃蜜作湯謂之佞湯以炭末乳香蜜作濕香謂之亷香放翁詠長安富庶有云紅桑琵琶金鏤花百六十絃彈法曲葢四十面琵琶也涪翁詩云一錢不直程衛尉萬事稱好司馬公白髪永無懐橘日三年惆悵荔枝紅張巨山詩云故園墳樹想青葱寒食風光淚眼中自痛不如傖父子紙錢猶掛樹頭風予以永感之人久離墳墓每讀為之澘然涪翁云百葉緗梅觸撥人又云推牀破面掁觸人樂天橊花詩撑撥詩人興陸天隨蠧化曰或掁觸之輒奮角而怒朝野僉載楊廷玉囘波詞阿姑婆見作天子旁人不得掁觸山谷詠鷓鴣詩云終日憂兄行不得鷓鴣應是鼻亭公象甞封於鼻亭栁子厚有鼻亭神記或謂山谷在永所作永州道接鼻亭故云非也半山云退之善為銘如王適張徹尤奇余亦謂董府君及貞矅二銘尤妙董云物以久弊或以轢毁攷致要歸孰有彼此由我者吾不我者天斯而以然其誰使然貞曜云於戲貞曜維出不訾維持不猗維卒不施以昌於詩坡翁甞舉此問王定國云當昌其身耶昌其詩也王来詩不契所問乃作詩答之曰昌身如飽腹飽盡還復饑昌詩如膏面為人作容姿不如昌其氣鬱鬱老不衰雖云老不衰刼壊安所之不如昌其志志一氣自隨養之塞天地孟軻不吾欺案韓愈集董府君銘原本董訛蕭物訛或今據本集改正半山詩云謀臣本自繫安危賤妾何能作禍基但願君王誅宰嚭不愁宫裏有西施李泰伯詩云若教管仲身長在宫内何妨有六人在管仲時桓公之心未蠧也若巳蠧雖管仲奈何未有心蠧尚能用管仲之理張文定遊華清宫云當初不是不窮奢民樂昇平不怨嗟姚宋未亡妃子在胡塵那得到中華亦此意也王荆公書堂詩烏石岡頭上塚歸柘岡西畔下書帷辛夷花發白如雪萬國春風慶歴時皆有可觀者案此句皆字無著疑此詩前尚有一詩傳寫佚脫姜堯章雪中訪范至能於石湖詩云雪矸如玉城偏師敢輕犯黄蘆陣野鶩我自將十萬三戰渠未降北面石湖范先生霸越手定自一笑粲至能酬之云鵝鶩聲喑雪意豪直前不憚夜行勞更能櫜鞬尊裴度千古人知李愬髙前輩稱㢡後進不以名位自髙交相尊讓亦可見一時士大夫風俗之美也昔鮑永過更始之墓欲下車致禮從事止之以為不可曰吾甞北面事之安可乗車而過吾寧獲罪於司𨽻遂下車慟哭而去光武聞之曰可謂忠臣矣王仁裕過闗中望春明門乃蜀後主被誅之地乃作詩哭之曰九天冥漠信沈沈重過春明淚滿襟齊女呌時魂巳㫁杜鵑啼處血尤深霸圖傾覆人全去寒骨飄零草亂侵何事不如陳叔寳朱門流水自相臨徐鉉歸朝後乞為故主李煜作墓碑朝廷從之案翟耆年籀史太平興國中詔侍臣撰李煜神道碑有欲中傷徐鉉者奏曰呉王事莫若徐鉉為詳遂詔鉉撰鉉乞存故主之義云云非鉉乞撰此所記殊誤謹附訂於此其辭有云盛徳百世善繼者所以主其事聖人無外善守者不能固其存西鄰起釁南箕搆禍投杼致慈親之惑乞火無鄰婦之辭又曰孔明罕應變之略不成近功偃王躬仁義之行終於亡國又作詩挽之云歘忽千齡盡冥茫萬事空青松洛陽陌荒草建康宫道徳遺文在興衰自古同受恩無補報反袂泣途窮土徳承餘烈江南廣舊恩一朝人事廢千古信書存哀挽周原道銘旌鄭國門此生雖未死寂寞巳消魂道山新聞云李後主宫嬪窅娘纖麗善舞後主作金蓮髙六尺飾以寳物組帶纓絡蓮中作五色瑞雲令窅娘以帛繞腳令纖小屈上作新月狀素襪舞雲中曲有凌雲之態唐鎬詩曰蓮中花更好雲裏月長新是人皆效之以弓纖為妙葢亦有所自也又有金蓮步詩云金陵佳麗不虚傳浦浦荷花水上仙未㑹與民同樂意卻於宫裏看金蓮開元中賜邊軍纊衣製於宫中有兵於袍中得詩云沙場征戰客寒苦若為眠戰袍經手作知落阿誰邊蓄意多添線含情更著綿今生巳過也重結後生縁兵士以詩呈帥帥進呈𤣥宗徧示宫中曰作者勿隠不汝罪有一宫人自言萬死上深憫之遂以嫁得詩者謂曰吾與汝結今生縁邊人感泣又僖宗時自内中出袍千領賜塞外吏士有馬真者於袍中得金鎖一枚詩一首云玉燭製袍夜金刀呵手裁鎖寄千里客鎖心終不開真就市貨為人所告主將奏聞僖宗令赴闕以宫人妻之其後僖宗幸蜀真晝夜不解衣捍禦此事凡有兩出處未知孰是姚鏞字希聲號雪篷紹定間以忤陳子華謫之衡陽甞有一聨云癡雲蔽嶽行人逺淫雨摧花白髪生戴復古由閩度嶺訪之有云一官不幸有奇禍萬事但求無愧心姚謝之云萬里尋遷客三年見此人蕭大山亦寄詩云得謗何須囊薏苡工騷且自製芙蓉剡僧淵萬壑云故里田園抛弟妹異鄉燈火對妻兒十年漂泊孤篷雪誰補梅花入楚辭至端平丁酉甫得自便有詩云天恩下釋湘纍客心事悠悠月一船種藥已收思病日著書不就負殘年雜花怪石分人去老竹荒亭入畫傳歸夢鑑湖三百里白鷗相候亦欣然故剡僧皓鐵山以詩迎之云楚鴈傳歸信呉鷗候過船三衢常山旅邸壁間有詩云酴釄香夢怯春寒永晝垂簾燕子閒敲㫁玉釵銀燭冷計程應巳過常山又南國傷䜛縁薏苡西園議價指葡萄惟餘白髪存公道近日豪家染髩毛又有約未歸蠶結局小軒空度牡丹春夜来揀盡鴛鴦繭留織征衫寄逺人衢人徐子勉假館浙西主人調官都城與之偕主人買妾以歸舟中置酒奏伎歌闌酒罷深夜就寢徐夢一士云君輩方盡歡而鬼趣有苦饑者獨不能以餘瀝見及乎因哦詩一章徐驚寤忘之已而復夢如初乃盡憶其語云鬼嘯猩吟沸簧笛碎板玉盤珠亂擲二八佳人舞倦時蝶困東風斂雙翼張樞斗南其出處已畧載詞話踐敭朱華為宣詞令閤門簿書詳知朝儀典故其姑縉雲夫人承恩穆陵因得出入九禁備見一時宫中燕幸之事甞賦宫詞七十首盡載當時盛際非其他想像而為者今摭其十於此堯殿融春大宴開山呼纔了樂聲催侍臣宣勸君恩重宰相親王對舉盃觀堂鐘響待催班步入朱廊十二間宣坐賜茶開講席花磚咫尺對天顔月籠梅影夜深時白玉排簫索獨吹傳得官家暗宣賜黄金約臂翠花枝翠枝斜插滴金花特髻低蟠貼水荷應奉人多宣喚少海棠花下看飛梭笙歌散後歸深院花栁隂中過曲廊靜掩金鋪三十六黄昏處處爇衙香燦錦堂西過夕陽水風吹起芰荷香内監催掃池邊地準備官家納晚涼晚涼開燕近中秋香染金風倚桂樓花月新篇初唱徹内人傳㫖索歌頭原註穆陵製花月篇銀簧乍靘參差竹玉軸新調尺合絃奏罷六么花十八水晶簾底賜金錢迴廊隔樹簾簾捲曲水穿橋路路通禁漏滴斜花外日御香薰暖栁邊風紫閣深嚴邃殿西書林飛白揭宸奎黄封繳進昇平奏直筆夫人看内批黄文雷字希聲永嘉人希聲有看雲詩不行於世其賦昭君行特為一時名公所稱道其辭云君不見未央殿前羅九賔漢皇南面呼韓臣無人作歌繼大雅至今遺恨悲昭君丙殿春閒鬭馮傅掖庭新花隔煙霧票姚枉奪燕支山玉顔竟上氈車去人生流落那得知不應畫史嫌蛾眉癡心又共琵琶語歸夢豈隨鴻鴈飛穹廬隨分薄梳洗世間禍福還相倚上流厭人知奈何後来燕啄皇孫死野狐落中髙臺傾宫人斜邊曲池平千秋萬歳只如此誰似青塚年年青按竟寧元年呼韓邪旣壻漢氏其年五月宫車晏駕故云康與之伯可詩云越王山下千樹梅逐客年年走馬来寒玉滿枝風色裏不受暖靄輕煙催故人千里復萬里折香欲寄生徘徊孤吟獨醉常夜半山月野風騎馬回余家有與之手書古詩一巻自號八本辭語亦騷雅往往反為樂府所掩也劉克莊潜夫甞賦梅花百詠其間有云春風謬掌花權柄卻忌孤髙不主張當國者以為譏已遂以煩言去國其後又作訪梅詩云夢得因桃數左遷長源為栁忤當權幸然不識桃并栁卻被梅花累十年原註鄴侯咏栁云青青東門栁歳晏必憔悴楊國忠以為譏已明皇曰咏李者當為譏朕乎又甞通朝行啓云實則咏桃乃曰含譏於燕麥偶然題檜遂云寓意於蟄龍東坡梅詩云憑仗幽人收艾納國香和雨入莓苔艾納梅枝上苔也梅至花過則苔極香取少許細嚼之苦而後甘如食橄欖坡意葢在此也呉興張沄聲父有苔梅詩云老龍全身著艾納不耐久蟄潜挐空爪頭撥動陽春信香在霜痕雪㸃中然苔亦多不同陽羨石庭者如松花越中項里者如緑髪余甞有句云山林緑髪秦宫女風雨青萍禹廟梁或以為可林靖之共甫呉興前輩能詩不凡賦梅云與月淡交連影痩于春無競著花疎細雨斂塵棲萼潤輕雲度谷壓香低慶元丙辰冬姜堯章與俞商卿銛朴翁案癸辛雜識葛天民字無懐後為僧名義銛號朴翁此云銛朴翁疑當時取其僧名下一字稱之張平甫自封禺同載詣梁谿道呉淞旣歸各得詩詞若干解鈔為一巻命之曰載雪録其自敘云予自武康與商卿朴翁同載至南谿道出苕霅呉淞天寒野廻仰見鴈鶩飛下玉鑑中詩興横發嘲唅吟諷造次出語便工而朴翁尤敏不可敵未浹日得七十餘解復有伽語小詞隨事一笑大要三人鼎立朴翁似曹孟徳據詩社出奇無窮商卿似江東多奇秀英妙之士獨予椎魯不武雖自謂漢家子孫然不敢與二豪抗也且云此編向見之雪林李和父後歸之僧頤䝉乃朴翁手書也古律絶句賛頌偈聨句詞曲紀夢凡一百五十三多集中所無者蕭介父題云亂雲連野水連空只有沙鷗共數公想得句成天亦喜雪花迎櫂入呉中孫季蕃云詩字崢嶸照眼開人隨塵刼挽難囘清苕載雪流寒碧老我扁舟獨自来余家向有小廨在杭之曲阜橋每夕五鼓間早朝傳呼之聲雖大雨風雪中亦然於是慨歎虚名之役人也如此旣而於壁間得一絶云霜拂金鞍玉墜腰鄰雞催喚紫宸朝爭如林下飽清夢殘月半牕松影搖頗得予心之同因以類得數篇併書於此樂天寄陳山人云待漏五門外候對三殿裏髭鬚凍生冰衣裳冷如水忽思仙遊客暗謝陳居士暖覆褐衣眠日髙應未起又詩云重裘暖帽寛氈履小閣低牕深地爐身稳心安眠未起西京朝士得知無軟綾腰褥薄綿被涼冷秋天稳暖身一覺曉眠殊有味無因說與早朝人又云雞鳴一覺睡不博早朝人諺云骨邊肉五更睡雖不多最有味正此意也坡翁寄傲軒詩云牀頭車馬道殘月掛疎朩朝客紛擾時先生睡方熟范至能冬至晩起云新衣兒女閙燈前夢裏莊周正栩然騎馬十年聽曉鼓人生元有日髙眠近世翁定逺新其說云遲明騎馬謁朱門安得梅花入夢魂慚愧髙人眠正熟一生知不受人恩周端臣題東庵云一庵自隠古城邊不是山林不市廛落月滿牕霜滿屋卧聽宰相去朝天嚴中和號月澗近世詩人間多佳句旣無行巻因摘一二於此云山中道人不裹巾一片石牀生緑鱗昨夜瓦瓶冰凍破梅花無水自精神又梅天雨氣入簾櫳衣潤頻添栢火烘四月江南無矮樹人家都在緑隂中又一聲杜宇三更後向曉緑隂連碧苔卻恨樓髙春數尺栁綿飛不上牕来又樹影踏不碎花香嗅卻無寺老栁遮塔雨多春礙船澗水活不凍山楓老自靈畫扇題詩鸞背濕銅彛煎腦鴨心香皆佳句也馮去辯可訥之遊京口也岳肅之持饟節在焉相得甚懽岳號倦翁甞自叙云司馬長卿故倦遊注謂厭宦遊也是時長卿方以士客臨卭令所固未甞宦焉知倦耶如予所謂倦者乃真知之甞賦二詩有云片雲出岫猶知倦流水吟湘肯伴牢又云尚有奏篇煩狗監肯辭馳傅為駹臣可訥次韻云饟事十年當結局襟期千古與同牢又云琴心自誤誰料理犢鼻雖貧未主臣肅之為之擊節不巳題其末云此小馮君讀珂之文也趙良淳字景程號常軒饒之餘干人忠定丞相之曾孫咸淳甲戌長江失守凡内郡悉除授宗姓公守霅明年城失守公以片紙書付其子曰寧為趙氏鬼不作他國臣行年五十有三守土而死節尚復奚憾諸子幸而生者勉旃忠孝書訖付其子友仲遂閉閤投繯而死時乙亥除夕也陳體仁尚書作詩三章哀之曰日慘天無色城危歳迫除孤忠元自許一死不知餘束衽全遺體呼兒授訣書登陴才信宿腸㫁正愁予忠定扶神鼎安邦不顧身曾孫能致命屬籍豈無人歸骨番江上招魂霅水濵死生均此念老病泣遺民慷慨君醻國奔逃我喪家陸沈同一壑淵涉𣺌無涯祈死惟嫌晩餘生只自嗟蒿莱連雉堞落日噪棲鴉陳諤越人甞遊廬山於窮谷中遇一人髽而跣坐大盤石微作吟哦聲陳異而問焉髽瞠目不答驚逝去陳益異之至明因寺為僧道所見僧曰此興國趙知軍也為郡有異政民徳之兵火後棄家入山寺中日以少米給之指穹林絶巘間曰此其所居也陳䇿杖披荆訪之髽知有人至已逸去矣獨葦屋一間不蔽風雨土朩瓦器地爐竹几而已間有破石硯短紙數十幅取視之則詩也或一聨二聨無成章者陳僅記其數語云戰血肥春草妖魂附野狐又風吹沙草落日黄鴉啄髑髏飛不起葢有道者云趙南仲丞相入汴日甞經宿境見奇石不忍舍其後治圃溧水第因語曩事時趙邦永在傍退即負之而来儼然昔所見也葢當時意公所喜即令人舁置轉江而歸焉公猶憶其左跗闕如視之果然適一匠睨而噩嘆曰異哉當年所失某適得之取而脗合渾然天成公異其事而銘之云昔我於役在宿之野煙磊塵砢應接不暇維州所宅挺立翹楚旣賞而稱欲去而佇今我来居於溧之北孰為而至不謀而得河浙相望邈風馬牛一念所到造化與醻工胡運斤夷於左股迫而視之闕如其故人力攸及理無復全疇昔啓之匠亦有言執藝函山畱余可績匪尺而量匪管而測乃命之前乃挈之聨如磁引鐵如鸞膠弦於戲棄而取之石無所欣戚也㫁而續之石無所損益也物各付物天契其天我銘此石莫非自然此馮可遷之文也余甞誌其事於野語而闕此文今詳書之宋廖瑩中羣玉以賈相入幕之賔例行推賞外别賜上金百兩廖以之鑄盤匜為飲器楊平舟棟為作古篆銘於器云皇帝御極之三十七年國有大功一相禹胼曰余瑩中與隨斾旃余㚄手扶余後手牽曰公何之敵脅是穿奇勝草坪受降馬前公一何勇敵一何恐余汔濟黄公飯余共挽漢倒江盡洗羶湩旣清夷矣公歸余從内金惟精上賞惟重文昌孫子是寳是用誰其銘之史臣楊棟開禧中有苖氏女本宦族也失身為妾於某朝士臨行作詩别其母云桃花飛盡馬塍春此日辭家淚滿巾豈是比鄰無嫁處千山萬水逐行人朝士者知之遂厚給資以嫁焉葛嶺故相賈似道園池留題者甚衆獨呉人湯益字損之一詩膾炙人口云檀板歌殘陌上花過牆荆棘刺簷牙指揮已失鐵如意賜與寧存玉辟邪廢館晝飛無主燕荒池春吠在官蛙朩綿庵下猶愁絶月黑夜深聞鬼車張良臣字武子近世詩人有雪牕集有子時甞從張公父至象臺其女兄即徐元杰仁伯之母也亦能詩甞有絶句云羅幕金泥窣地垂夜香燒盡二更時不知簾外溶溶月上到梅花第幾枝正自不凡吕紫微明妃曲人生在相合不論胡與秦但取眼前好莫言長苦辛君看輕薄兒何殊胡地人其意固佳然不脱王半山人生失意無南北之窠臼也林曾字伯元號梅嶼永嘉人詩極佳如汴河云一千八百隋家路兩岸青青入帝都可惜翠華南渡後舊時楊栁一株無俞桂英號野雲苦吟一生異時賈師憲甞稱其一㸃梅香到三分酒力消母念子行逺兒云爺未歸白雲一樹鶴孤宿明月滿樓鐘鼓聲百無一事身為客十有九分心在家之句然野雲自有人影詩為人所稱云身外復添汝無言隨去留自從生便有直到死方休步月常相逐臨溪元不流靜中明道眼總是一虚浮道士褚伯秀清苦自守甞集註莊老列三子天師以學修撰命之不就作貧女吟二首謝之曰夜績晨炊貧自由强教塗抹只堪羞閉門靜看花開落過卻春風不識愁寂寞篷牕鎖冷雲地爐紉補自陽春千金莫誤朱門聘不是穿珠插翠人候館牆壁所書多有可紀者予甞録數處矣今復得池洲貴陽驛壁間語云昨日雨今日晴前月小後月大君欲問百年百年如此過孰為辱孰為榮何者福何者禍山中多白雲莫教腳一蹉潭州四通館梁間有云蝸角名蠅頭利老天術何巧以此役斯世昨日一替死今日一替生暗裏換人人不悞門前每日見人行是皆警世之辭也賈師憲越第望海樓成越帥季鏞賦詩為賀陳宜中時為推官次韻云名與山髙千古重恩如海闊一身輕門下少年初幕府夢隨諸吏上崢嶸又云功歸再造金甌好歳巳三登玉燭調昨日倚笻平地看一如石壁望松寥葢用太白石壁望松寥宛然在碧霄葢山名也一時人稱其善於押韻自此登師憲之門云鄧林號謙谷臨川人甞客孟氏塾戲降紫姑得詩云隔溪雲薄雨飄瀟欲采荷花不見橋釵卜無憑芳信杳酸風空度鳳臺簫時有三鄧林其一括人其一臨江人甞入館廣徳村寺壁間有四明王曁文昌題云奔馳塵土何時了自歎一官如蟻小半夜覔宿僧家園夢裏聞鴉霜月曉曁時為邑尉後尉天台張汝鍇俞仲次韻云世事反觀俱了了鷃鵬何大亦何小朩人起舞中郎拍問著朩人應不曉二詩皆可録徳夀宫於呉中得一蟠松虬枝夭矯清䕃數畝思陵甞御製贊云天錫瑞朩得自嶔岑枝蟠數萬幹不倍尋怒騰龍勢靜奏琴音凌寒鬱茂當暑隂森封以腴壤邇以碧潯越千萬年以慰我心周益公翰苑作端午帖子云聞道天公近効奇澗松特長萬年枝蜿蜒正作祥龍舞移得清陰覆玉墀正謂此也田錫表聖太宗朝為翰苑有咸平集中多佳語如磬韻似煙和燭裊松聲如雨入牕流行色迎秋清似畫别情因景化為詩秋色數行江上鴈殘陽一簇渡頭人詠挑燈杖云自知不是明時用爛額焦頭力漫多賦楊花云乍如亂峰之下落泉飛練噴嵐灑煙沫花相濺政自不凡也周漢國公主下降撒帳詩云靜夜無雲惟自照鳳凰飛入合歡宫葢用王昌齡青鸞飛入合歡宫紫鳳銜花出禁中之句然西都賦云後宫則有增城合歡殿名也丁大全丞相謫嶺外至藤州溺死三山林桂龍以詩嘲之曰一柂中流欠把持偏輕偏重失便宜孤舟不是無人渡身作風波問阿誰移溪實壑誤明君驚動沿江十萬軍幸是不沈湘水死有何面目見靈均稚子如何濟急流一篙才錯便難收當初把作尋常看豈料中流解覆舟韓子蒼挽中山韓帥云金絮盟猶在灰釘事巳新案中山原本誤作中小今據韓駒陵陽集校正後村以為語妙而意婉葢宣靖之禍自滅遼取燕始上句指韓下句指童蔡也又梁徐勉以時人聞喪事相尚以速勉上疏云屬纊才畢灰釘巳具又陳徐陵遺楊遵彦書云若鄙諺為繆来㫖必通分請灰釘甘從斧鉞不特出前書也近歳浙右洊水田野流離可念震澤小寺壁間一詩云民力久已竭天乎不見憐三年兩遭水十室九無煙田沒官徴賦家貧子賣錢秋風江上路忽見渡江船真不減聶夷中也天台趙與侲英可甞夢賦落梅詩僅記一聨云溪月涵虚影山雲䕶㫁香莫知何祥後為豐儲倉監獲四剡後呉益尹京辟之為屬遂與合尖脫選葢呉尹自號雲山於是䕶香之句遂驗李仁甫十八歳為眉州解魁時第二人史堯弼字唐英方十四歳人疑其文未工也赴鹿鳴燕猶著粉紅袴太守命坐客分韻賦詩唐英得建字即席援筆立成有云四歳尚少房𤣥齡七步未饒曹子建後為張魏公客不幸早世鄭安挽丞相曾詠云如蠶吐緯日縈纒出沒無蹤屋漏邊懐毒滿身如蝎犬漫張羅網欲漫天葢為諸璫發也蘇拯詩云映日張網羅遮天亦何别倘居要地間害物可堪說風人詠物大率相類東莱吕舍人贈林少穎李迂仲詩云甞聞安身要其本在無競自註云王輔嗣昜解云安身莫若無競修已莫若自保守道則福至求福則辱来此格言也小小園林矮矮屋一日房錢一貫足官至正郎子讀書一妻一妾常和睦此詩張卿所作張仕至棘卿與史彌逺不合遂不復出矣蔡元長甞闢便坐曰南軒有獻詩者曰此軒端的向南開上下東西總不該更有一般堪愛處北風偏向後門来人號為貼題詩宣和間教坊大使袁祹應制詩云金瓶芍藥三千朶玉軸琵琶四百弦可謂盛矣吕之鵬密縣人申公之裔也大金宣宗頻年南伐因作詩撼主兵者云縫掖無由掛鐵衣劔花生澀馬空肥燈前草就平南䇿一夜江神涕泣歸其自負如此縉雲有掘地得碑石篆書公子行云少年公子出皇都勒馬途中倒玉壺卻問路傍耕稼者夜来風雨損花無並無歳月姓氏黄伯樞榮仲讀馬援傳詩云後車薏苡落䜛人珠貝文犀竟失真馬革裹尸猶不恨何須勝瘴與輕身近世趙汝淳讀夷堅志詩云千古丘明法度書豕啼虵鬭未為誣後来更有無窮事付與蘭臺鬼董狐用干寳事甚佳曾繹仲成詩云已無醜扇几邊亂空見舂鉏天際飛爾雅醜扇蠅也釋云醜類也青蠅之類好搖翅自扇案爾雅翥醜罅螽醜奮强醜埓蠭醜螸蠅醜扇俱巳醜字為句今曾詩未明句讀密又顛倒本文均誤韓平原用事時華岳子西為武學生甞獻詩云漢地不埋王莽骨唐天難庇禄山軀韓怒羈管建寧有詩號翠微集大抵皆麤惡語詩家謂誠齋多失之好奇傷正氣若梅子流酸軟齒牙芭蕉分緑與牕紗日長睡起無情思閒看兒童捉栁花極有思致誠齋亦自語人曰工夫只在一捉字上魏華父墨梅詩素王本自難緇涅墨者胡為亂等差𤣥裏只知楊子白皜中謾見聖人汙鶴山又有東西日月自来往遑卹人間有喘牛之句亦佳姚翻詩云臨妝欲含涕羞畏家人知還將粉中絮擁淚不教垂即今粉撲也案玉臺新詠載此詩還將作還持不教作不聽與此有異太平吟云紛紛紅紫已成塵布榖聲中夏令新夾路桑麻行不盡始知身是太平人此可謂善狀太平氣象勝於誠齋太平不在簫韶裏只在諸村打稻聲之句盱人王勝之詩云蛙鼓鳴時月滿川㫁螢飛處草迷煙敲門欲向田家宿猶有青燈人未眠殊有思致有為竹枕作銘云珊瑚枝琥珀盤流蘇帳暖驂飛鸞莫忘此君同歳寒亦佳語也后山仰看一鳥過虚負百年身極有深意案陳師道次韻秦少游春江秋野圖詩作倏看雙鳥下已負百年身任淵注本亦同此所引疑有誤周茂振樞密詩云醉倒不辭花面笑詩成親傍竹身題竹身二字甚新端平甲午入洛之役二趙喪師時劉子澄實主帷幄之籌遂坐貶封川意不復用趙仲之死子澄以詩哭之云功名翻覆等南柯雲掩新阡長薜蘿千載只憑公論去百年無奈世情何髙光時節經營易晉宋人才隠逸多入汴老賔猶坐謫餘生只合理煙蓑呉白字少白豪逸負氣詩文立成嗜酒窮空晩為僧於廣化寺時籍中有楊韻者能小詩善墨竹一日諸公會飯少白持白紈扇楊為作小枝於上少白即題一絶云風枝露葉有餘清轉盼還從玉筍生願得此君長在眼子猷雖老未忘情賈師憲甲戌歳寒食日絶句云寒食家家插栁枝留春春亦不多時人生有酒須當醉青冢兒孫幾箇悲明年師潰身殞遂成惡讖紹興已已南郊禮成思陵御製詩以賜云清壇祗謁禮郊丘輔相賢勞共款留初訝密雲低覆冒遽看霽景上飛浮氣囘爼豆羣工泰喜入貔貅萬馬秋赫赫天心允昭格恊謀同徳賴嘉猷案以下十九條有詩無話係原本脫落今附巻後山寺詩村南村北雨催耕布榖聲聲不住聽水入野田分井字山藏小寺只單丁傍花飛去禽身白帶土移栽樹腦青絶頂虬松髙百尺已經千歳長菟苓案原本下有久知老去安庚甲堪笑官忙縳邜申二句與此詩語意不倫今據文義刪去哀扇工歌某州竹扇名字著織扇供官困追捕使君開府未浹旬欲戴綸巾揮白羽新模巧製旋剪裁百中無一中程度犀革鐫柄出蟲魚麝煤熏紙生煙霧蕺山老姥羞翰墨漢宫佳人掩紈素衙内白取知何名帳下雄挐不知數供輸不辦箠楚頻一朝赴水將誰訴使君崇重耳不聞嗚呼何以慰黎庶聞道園家賣菜翁又說江頭打漁户號令亟下須所無官不與錢期限遽歸来痛哭辭妻兒宿昔投繯掛枯樹一雙婉婉良家子吏兵奪取名為顧弟兄號呌鄰里驚兩家吞聲喪其嫗死者已矣可奈何寃魂成羣相號呼殺人縱慾勢位尊貪殘無道天所怒邦人蓄憤不敢言君其拊馬章臺路案周煇清波别志載此詩作無名氏哀扇工歌首句某州作黄州陳振孫書録解題載沈作喆以悲扇工詩忤魏良臣疑即作喆之詩煇密均偶未攷寓山集也次張斗南韻云路穿厓曲幾囘環天地為鑪不掩闗守分固於貧亦樂任縁或以倦知還門前認取朝宗水屋上元非捷徑山若欲結茅相共住雲根可著兩三間案此詩原本失載姓名葉正則題孫季蕃詩云子美太白常住世佳人栩栩夢魂通瀉落天河澆汝舌移来不周盪爾胸千家錦機一手織萬古戰場兩峯直孰南孰雅喚莫前虚簫浪管生寒煙劉潜夫使廣日經過惠州六如亭有詩云呉兒解記真娘墓杭俗猶存蘇小墳誰與惠州耆舊記可無坏土覆朝雲於是郡守與之修墓立碑文題云昔人喜說墜樓姬前輩尤髙㫁臂妃肯伴主翁来過嶺不妨扶起六如碑天竺道間詩云西山多雨長灘聲更愛春禽百様鳴石罅暖煙飛不起日髙鞭影未分明七夕詩銀河如練月如鉤照見千家乞巧樓野老平生事事拙蒲團又過一年秋銀河清淺界煙霄欲渡何須烏鵲橋今我去家千里逺卻憐牛女會今宵案此詩原本失載姓名史達祖清明詩一百六朝花雨過栁梢猶爾病春寒晉官今日炊煙斷併著新晴看牡丹宫燭分煙眩曉霞驚心知又度年華榆羮杏粥誰能辦自採庭前薺菜花鄭如幾維心亦霅人與葉少藴唱和有看朱成碧醉中眼施粉太白尊前人之句案此條前當别論霅人故此云亦霅人傳寫佚脱林會溪上謠云溪翁兒女枕溪住時把釣竿倚芳樹沈吟獨坐忽傷心釣得魚来放將去近北客有題襄漢詩云襄漢雲屯十萬兵習池酩酊不曾醒紛紛誤晉皆渠輩不特王家一寧馨范至能嘲蚊語云沈酣尻益髙飽暖膓漸急晶晶紫蟹眼滴滴紅飯粒李龏賦青城山䧟詩云蜀道天收碧落鍾六丁移路鑿蠶叢飛山夜挾風雷沒愁殺江南鬼五通林曾泗州詩魚頭紅結魫土面白生硝王予可賦凌霄詩云啼鳥倒銜金羽舞驚蛇斜傍玉簾飛題靈隠寺詩云遊山無處浣塵埃出郭尋幽入翠苔衆水盡從雙澗去一峯元自五天来行春人散題名在坐夏僧閒聽講回清磬一聲猿鳥寂石楠花落滿經臺放翁理詩云萬物元須一理通長生極治本同功廣成千歳無他術秖在唐虞二典中涪翁愛竹詩云野次小崢嶸幽篁相衣緑牧童三尺箠御此老觳觫竹吾甚愛之無使牛礪角牛礪角尚可牛鬭殘我竹桃紅淨山雨乾褐翅鬼蛾粘石闌厓根薜荔絡隂土春草自緑麒麟寒時思堂前滿牀笏牛眠岡頭空白骨急呼斗酒澆淚痕頭上飛光出還沒案此詩失載姓名併佚原題浩然齋雅談巻中
