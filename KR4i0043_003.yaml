body:
  text: 浩然齋雅談卷下宋周密撰樂天有感石上舊字詩云太湖石上鐫三字十五年前陳結之蓋其妾桃葉也自昔未有以家妓字鐫石者劉過改之嘗遊富沙與友人吳仲平飲於吳所歡吳盼兒家嘗賦詞贈之所謂雲一窩玉一梭淡淡衫兒薄薄羅輕顰雙黛蛾盼遂屬意改之吳憤甚挾刃刺之誤傷其妓遂悉繫有司時吳居父為帥改之以啓上之云韓擒虎在門顧麗華而難戀陶朱公有意與西子以偕來居父遂釋之然自是不復合矣改之有春風重到憑闌處腸斷糚樓不忍登蓋為此耳楊韻除夕詞一枝春云竹爆驚春競喧闐夜起千門簫鼓流蘇帳掩翠鼎暖騰香霧停杯未舉奈剛要送年新句應自有歌字清圓未誇上林鶯語從他歲窮日暮縱間愁怎減劉郎風度屠蘇辦了迤邐栁忺梅妬宫壺未曉早驕馬繡車盈路還又把月夕花朝自今細數又羅希聲孫花翁所書除夕一詞云小童教寫桃符道人還了當年例神前竈下祓除清淨獻花酌水禱告些兒也都不是求名求利但吟詩寫字分數上面略精進儘足矣飲量添教不醉好時節逢場作戲驅儺爆竹軟餳酥豆通宵不睡四海皆兄弟阿鵲也同添一歲願家家户户和和順順樂升平世此集中所無也窗雲張樞字斗南又號寄間忠烈循王五世孫也筆墨蕭爽人物醖藉善音律嘗度依聲集百闋音韻諧美真承平佳公子也豫巳選六闋於絶妙詞今别見於此戀繡衾云屏綃裛潤惹篆煙小窗間人泥晝眠正雪暖酴釄架奈愁春塵鎖鴈絃楊花做了香雪夢化池萍猶泛翠鈿自不怨東風老怨東風輕信杜鵑清平樂云鳳樓人獨飛盡羅心燭夢繞屏山三十六依約水西雲北曉奩懶試脂鉛一緺鸞髻微偏留得宿粧眉在要教知道孤眠又朩蘭花慢云案花慢二字原本脫今據詞譜增入歌塵凝燕壘又軟語在雕梁記剪燭調絃翻香校譜學品伊涼屏山夢雲正暖放東風捲雨入巫陽金冷紅條孔雀翠間綵結鴛鴦銀缸焰冷小蘭房夜悄怯更長待采葉題詩含情贈逺煙水茫茫春妍尚如舊否料啼痕暗裏浥紅粧須覔流鶯寄語為誰老卻劉郎謝了梅花恨不禁小樓羞獨倚暮雲平夕陽微放栁梢明東風冷眉岫翠寒生無限逺山青重重遮不斷舊離情傷春還上去年心怎禁得時節又燒燈此周容子寬小重山子寬四明人秋崖李萊老與其兄篔房競爽號龜溪二隱豫已刊十二闋於絶妙選矣今復别見倦尋芳云繚牆粘蘚糝徑飛梅春緒無賴繡壓垂簾骨有許多寒在寶幄香銷龍麝餅鈿車塵冷鴛鴦帶想西園被一程風雨羣芳都礙逗曉色鶯啼人起倦倚銀屏愁沁眉黛待拚千金卻恨好晴難買翠苑歡遊孤解珮青門佳約芳挑菜栁初黃罩池塘萬絲愁藹點絳唇云緑染春波袖羅金縷雙鸂鶒小桃勻碧香襯蟬雲濕舞帶歌鈿間傍秋千立情何極燕鶯塵迹芳草斜陽笛西江月賦海棠云緑凝曉雲苒苒紅酣晴霧冥冥銀簪懸燭錦官城困倚牆頭半影雨後偏饒豔冶燕來同作清明更深猶喚玉靴笙不管西池露冷案玉靴笙三字未詳其義疑有誤篔房李彭老詞筆妙一世豫已擇十二闋入絶妙詞矣兹不重見外可筆者甚多今復托數首於此惜紅衣云水西雲北記前回同載髙陽伴侣一色荷花香十里偷把秋期頻數脆管排雲輕橈噴雪不信催詩雨碧筒呼酒秀箋題遍新句誰念病損文園歲華搖落事與孤鴻去露井邀涼吹短髮夢入蘋洲菱浦暗草飛螢喬枝翻鵲看月山中住一聲清唱醉鄉知有仙路送客木蘭花慢云折秦淮露栁帶明月倚歸船看佩玉紉蘭囊詩貯錦江滿吳天吟邊喚回夢蝶想故山薇長巳多年草得梅花賦了棹歌逺和離舷風絃盡入吟篇傷倦客對秋蓮過舊經行處漁鄉水驛一路聞蟬留連漫聽燕語便江湖夜雨隔燈前潮返潯陽暗水鴈來好寄瑤箋祝英臺近云案祝字原本脫今據詞譜增入載輕寒低鳴櫓十里杏花雨露草迷煙縈緑過前浦青青陌上垂楊綰絲搖珮漸遮斷舊曾吟處聽鶯語吹笙人逺天長誰翻水西譜淺黛凝愁逺岫帶眉嫵畫闌間倚多時不成春醉趂幾點白鷗歸去清平樂云合歡扇子撲蝶花隂裏半醉海棠扶半起淡日秋千間倚寶箏彈向誰聽一春能幾番晴帳底栁綿吹滿不教好夢分明章臺月云露輕風細中庭夜色涼如水荷香栁影成秋意螢冷無光涼入樹聲碎玉簫金縷西樓醉長吟短舞花隂地素娥應笑人憔悴漏歇簾空低照半牀睡又青玉案云楚峰十二陽臺路算只有飛紅去玉合香囊曾暗度榴裙翻酒杏簾吹粉不識愁來處燕忙鶯懶青春暮蕙帶空留斷腸句草色天涯情幾許酴釄開盡舊家池館門掩風和雨又張直夫嘗為詞敘云靡麗不失為國風之正間雅不失為騷雅之賦摹擬玉臺不失為齊梁之工則情為性用未聞為道之纍樓茂叔亦云裙裾之樂何待晚悟筆墨勸淫咎將誰執或者假正大之説而掩其不能其罪我必焉雖然與知我等耳三十年前愛買劍買書買畫凡幾度詩壇爭敵酒兵爭霸春色秋光如可買錢慳也不曾論價任粗豪爭肯放頭低諸公下今老大空嗟訝思往事還驚詫是和非未説此心先怕萬事全將飛雪看一間且問蒼天借樂餘齡泉石在膏肓吾非詐此西里趙希邁滿江紅也清源張涅所賦祝英臺近云一番風連夜雨收拾做春暮豔冷香銷鶯燕慘無語曉來緑水橋邊青門陌上不忍見落紅無數怎分付獨倚紅藥欄邊傷春甚情緒若取留春欲去去何處也知春亦多情依依欲住子規道不如歸去楊纘字嗣翁號守齋又稱紫霞本鄱陽洪氏恭聖太后姪楊石之子麟孫早夭遂祝為嗣時數歲往謝史衛王王戲命對云小官人當上小學即答云大丞相已立大功衛王大驚喜以為逺器公亷介自將一時貴戚無不敬憚氣習為之一變洞曉律吕嘗自製琴曲二百操又常云琴一絃可以盡曲中諸調當廣樂合奏一字之誤公必顧之故國工樂師無不嘆服以為近世知音無出其右者任至司農卿浙東帥以女選進淑妃贈少師所度曲多自製譜後皆散失今書一闋於此被花惱云疏疏宿雨釀寒輕簾幃靜垂清曉寶鴨微溫瑞煙少簷聲不動春禽對語夢怯頻驚覺欹珀枕倚銀屏半窗花影明東照惆悵夜來風生怕飛香濕瑤草披衣便起小徑曲廊處處都行到正蜂癡蝶騃戀芳妍怎奈向平生被花惱驀忽地省得而今雙鬢老徐愛山堪舉二闋亦佳小重山云鼓報黃昏禽影歇單衣猶未試覺寒怯塵生錦瑟可曾閲人去也間過好時節對景復愁絶東風吹不散鬢邊雪些兒心事對誰説眠不得一枕杏花月謁金門云休只坐也去看花則箇明日滿庭紅欲墮花還愁似我索性癡眠一和憑箇夢兒好做杜宇不知春已過枝頭聲越大亦不知為何人作也謁金門云人病酒生怕日髙催繡昨夜新翻花樣瘦旋描雙蝶湊慵憑繡牀呵手卻説新愁還又門外東風吹綻栁海棠花厮勾踏莎行云照眼菱花剪情菰葉夢雲吹散無蹤迹聽郎言語識郎心當時一點誰消得栁暗花明螢飛月黑臨窗滴淚研殘墨合歡帶上舊題詩如今化作相思碧此二詞並見趙聞禮約月集然集中大半皆樓君亮施仲山所作安知非他人者翁元龍字時可號處靜與吳君特為親伯仲作詞各有所長世多知君特而知時可者甚少豫嘗得一編類多佳語已刊於集矣今復托數小闋於此江城子云一年簫鼓又疏鐘愛東風恨東風吹落燈花移在杏梢紅玉靨翠鈿無半點空濕透繡羅弓燕魂鶯夢漸惺鬆月簾櫳影迷濛催趂年華都在艷歌中明日栁邊春意思便不與夜來同立春西江月云畫閣換粘春帖寶箏拋學銀鉤東風輕滑玉叉流織就燕紋鶯繡隔帳燈花微笑倚窗雲葉低收雙鴛刺罷底尖頭剔雪間尋豆蔲賦茉莉朝中措云花情偏與夜相投心事鬢邊羞薰醒半牀涼夢能消幾箇開頭風輪慢卷冰壺低架香霧颼颼更著月華相惱朩犀淡了中秋巧夕鵲橋仙云天長地久風流雲散惟有離情無算從分金鏡不曾圓到此夜年年一半輕羅暗網蛛絲得意多似粧樓針線曉看玉砌淡無痕但吹落梧桐幾片又如拗蓮牽藕線藕斷絲難斷彈水沒鴛鴦教尋波底香真花間語也宋謝太后北覲有王夫人題一詞於汴京夷山驛中云太液芙蓉渾不似舊時顔色曾記得春風雨露玉樓金闕名播蘭馨妃后裏暈潮蓮臉君王側忽一聲鼙鼓揭天來繁華歇龍虎散風雲滅千古恨憑誰説對山河百二淚盈襟血客館夜驚塵土夢宫車曉碾關山月問姮娥於我肯從容同圓缺文宋瑞丞相和云燕子樓中又捱過幾番秋色相思處青春如夢乘鸞仙闕肌玉暗銷衣帶緩淚珠斜透花鈿側最無端蕉影上窗紗青燈歇曲池合髙臺滅人間事何堪説向南陽阡上滿襟漬血世態便如翻覆手妾身元是分明月笑樂昌一段好風流菱花缺又代王夫人再用韻云試問琵琶胡沙外怎生風色最苦是姚黃一朵移根丹闕王母歡闌瑤宴罷仙人淚滿金盤側聽行宫半夜雨淋鈴聲聲歇綵雲散香塵滅銅駝恨那堪説想男兒慷慨嚼穿齦血回首昭陽辭落日傷心銅雀迎新月算妾身不願似天家金甌缺鄧光薦和云王母仙桃親曾醉九重春色誰信道鹿銜花去浪翻鼇闕眉鎖姮娥山宛轉髻梳墜馬雲欹側恨風沙吹透漢宫衣餘香歇霓裳散庭花滅昭陽燕應難説想春深銅雀夢殘啼血空有琵琶傳出塞更無環佩鳴歸月又爭知有客夜悲歌壺敲缺御風來翠鄉深處連天雲錦平逺卧遊已動蓬舟興那在芙蓉城畔巾懶岸任壓頂嵯峨滿鬢絲零亂飛吟水殿載十丈青青隨波弄粉菰雨淚如霰斜陽外也有仙粧半面無言應對花怨西湖千頃腥塵暗更憶鑑湖一片何日見試折藕占絲絲與腸俱斷遐征漸倦當潁尾湖頭緑波彩筆相伴老坡健此劉闌養原遊天台鴈蕩東湖所賦買陂塘詞絶筆也哀哉薛梯颷長短句豫嘗收數闋於絶妙詞今復得其醉落魄云單衣乍著滯寒更傍東風作珠簾壓定銀鉤索雨弄初晴輕旋玉塵落花唇巧借粧梅約嬌羞才放三分萼樽前不用多評泊春淺春深都向杏梢覺章牧之謙亨嘗為浙東憲風采為一時所稱然醖藉滑稽嘗賦守嵗小詞云團欒小酌醺醺醉厮捱著沒人肯睡呼盧直到五更頭便鋪了粧臺梳洗庭前鼓吹喧人耳驀忽地又添一歲休嫌不足少年時有幾多少老如我底金貞祐中太原已受兵人情洶洶忽有書一詞於府治宣詔亭壁間云并州霜早禾黍離離成腐草馬困人疲惟有郊原雀鼠肥分明有路好逐衡陽征鴈去鼓角聲中全晉山河一半空蓋鬼詞也淳祐間丹陽太守重修多景樓髙宴落成一時席上皆湖海名流酒餘主人命妓持紅箋徴諸客詞秋田李演廣翁詞先成衆人驚賞為之閣筆其詞云笛呌東風起弄尊前楊花小扇燕毛初紫萬點淮峯孤角外驚下斜陽似綺又婉婉一番春意歌舞相繆愁自猛捲長波一洗空人世間熱我醉時耳緑舞冷葉瓜洲市最憐豫洞簫聲盡闌干獨倚落落東南牆一角誰護山河萬里問人在玉關歸未老矣青山燈火客撫佳期漫灑新髙淚歌哽咽事如水古詞有元夕望逺行又還到元宵臺榭記輕衫短帽酒朋詩社爛漫向羅綺叢中馳騁風流俊雅轉頭是三十年話量減才慳自覺是歡情衰謝但一點難忘酒痕香帕如今雪鬢霜髭嬉遊不忺深夜怕相逢風前月下翁賔暘謂是孫季蕃詞然集中無之翁孟寅賔暘嘗遊維揚時賈師憲開帷閫甚前席之其歸又置酒以餞賓暘即席賦摸魚兒云捲西風方肥塞草帶鈎何事東去月明萬里關河夢吳楚幾番風雨江上路二十載頭顱凋落今如許涼生弄塵歎江左夷吾隆中諸葛談笑已塵土寒汀外還見來時鷗鷺重來應是春暮輕裘峴首陪登眺馬上落花飛絮拚醉舞誰解道斷腸賀老江南句沙津少駐舉目送飛鴻幅巾老子樓上正凝佇師憲大喜舉席間飲器凡數十萬悉以贈之宣和中李師師以能歌舞稱時周邦彥為太學生每遊其家一夕值祐陵臨幸倉卒隱去既而賦小詞所謂并刀如水吳鹽勝雪者蓋紀此夕事也未幾李被宣喚遂歌於上前問誰所為則以邦彥對於是遂與解褐自此通顯既而朝廷賜酺師師又歌大酺六醜二解上顧教坊使袁祹問祹曰此起居舍人新知潞州周邦彥作也問六醜之義莫能對急召邦彥問之對曰此犯六調皆聲之美者然絶難歌昔髙陽氏有子六人才而醜故以比之上喜意將留行且以近者祥瑞沓至將使播之樂府命蔡元長微叩之邦彥云某老矣頗悔少作會起居郎張果與之不咸亷知邦彥嘗於親王席上作小詞贈舞鬟云歌席上無賴是橫波寶髻玲瓏欹玉燕繡巾柔膩掩香羅何況會婆娑無箇事因甚斂雙蛾淺淡梳粧疑是畫惺鬆言語勝聞歌好處是情多為蔡道其事上知之由是得罪師師後入中封瀛國夫人朱希真有詩云解唱陽關别調聲前朝惟有李夫人即其人也何籕作宴清都有天逺山逺水逺人逺之語一時號為何四逺然前是宋景文出知夀春過維揚賦浪淘沙近留别劉原父云少年不管流光如箭因循不覺韶光換至如今始惜月滿花滿酒滿扁舟欲解垂楊岸尚同歡宴日斜歌闋將分散倚闌遙望天逺水逺人逺籕蓋用此也王藻有别詞云玉東西歌宛轉未做苦離調著上征衫字字是愁抱月寒鬢影刁蕭柁樓開纜記栁暗乳鴉啼曉短亭草還是緑與春歸羅屏夢空好燕語難憑憔悴未渠了可能妬栁羞花起來渾懶便瘦也教春知道嘗得題壁生查子云秋盈鏡裏山心疊琴中恨露濕玉欄秋香伴銀屏冷雲歸月正圓鴈到人無信孤損鳳凰叉立盡梧桐影蓋魏子敬之詞也汪彥章舟行汴河見傍岸畫舫有映簾而窺者止見其額賦詞云小舟簾隙佳人半露梅粧額緑雲低映花如刻恰似秋宵一半銀蟾白蓋以月喻額也辛幼安嘗有句云聞道綺陌東頭行人會見簾底纖纖月則以月喻足無乃太媟乎周美成章短句純用唐人詩句如低鬟蟬影動私語口脂香此乃元白全句賀方回嘗言吾筆端驅使李商隱溫庭筠常奔走不暇則亦可謂能事矣浩然齋雅談卷下
